# ══════════════════════════════════════════════════════════════════════════════
# Digital Ocean App Platform — App Spec
# Deploy via: doctl apps create --spec .do/app.yaml
# Or paste contents into DO App Platform dashboard → "Edit Spec"
# ══════════════════════════════════════════════════════════════════════════════

name: hcc-agent
region: nyc    # Change to: nyc, sfo, lon, sgp, fra, ams, blr, syd, tor

services:
  - name: web
    # ── Build from GitHub repo ────────────────────────────────────────────────
    github:
      repo: YOUR_GITHUB_USERNAME/Agent_HCC    # ← Replace with your GitHub repo
      branch: main
      deploy_on_push: true

    # ── Docker build ──────────────────────────────────────────────────────────
    dockerfile_path: Dockerfile
    build_command: ""   # Docker handles the build

    # ── Runtime ───────────────────────────────────────────────────────────────
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb    # Cheapest: ~$5/month
    # Upgrade to apps-s-1vcpu-1gb (~$12/mo) for more traffic

    # ── Health check ─────────────────────────────────────────────────────────
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3

    # ── Routes ───────────────────────────────────────────────────────────────
    routes:
      - path: /

    # ── Environment Variables (set in DO Dashboard, NOT here for secrets) ─────
    # Add these in DO App Platform → App Settings → Environment Variables
    # Mark secrets as ENCRYPTED
    envs:
      - key: NODE_ENV
        value: "production"
        scope: RUN_AND_BUILD_TIME

      - key: NEXT_PUBLIC_BASE_URL
        value: "https://YOUR-APP-NAME.ondigitalocean.app"   # ← Set your DO domain
        scope: RUN_AND_BUILD_TIME

      # ── Supabase ─────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: "https://wkyzejotrcraluextvpc.supabase.co"
        scope: RUN_TIME

      - key: SUPABASE_ANON_KEY
        value: ""          # ← Paste your key (mark as encrypted)
        type: SECRET
        scope: RUN_TIME

      # ── Stripe ───────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        value: ""          # ← Paste your rk_live_... key (mark as encrypted)
        type: SECRET
        scope: RUN_TIME

      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: "pk_live_51Rk7BwRQDUL2boKrXdZBT6v6OID11N4nuV8wOIjdff7wvERGRrNvlK7ZlA19LX1cj4JVKy4GALTykzDKj6Bk9KNe00I3nlJ02i"
        scope: RUN_AND_BUILD_TIME

      - key: STRIPE_WEBHOOK_SECRET
        value: ""          # ← NEW production webhook secret (see DEPLOYMENT.md)
        type: SECRET
        scope: RUN_TIME

      # ── Gmail ─────────────────────────────────────────────────────────────
      - key: GMAIL_USER
        value: "knoxvillehcc@gmail.com"
        scope: RUN_TIME

      - key: GMAIL_APP_PASSWORD
        value: ""          # ← Your Gmail app password (mark as encrypted)
        type: SECRET
        scope: RUN_TIME
